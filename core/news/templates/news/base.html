<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} TechPulse{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            padding-top: 70px;
        }
    </style>
</head>
<body class="bg-light">
    <header>
        <nav class="navbar navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold text-primary" href="{% url 'home' %}">Tech<span class="text-white">Pulse</span></a>
                <div class="navbar-nav ms-auto flex-row gap-3">
                    {% if user.is_authenticated %}
                        <a class="nav-link" href="{% url 'my_favorites' %}">Mes Favoris</a>
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link text-white">Déconnexion</button>
                        </form>
                    {% else %}
                        <a class="nav-link" href="{% url 'login' %}">Connexion</a>
                        <a class="nav-link btn btn-primary text-white px-3" href="{% url 'register' %}">S'inscrire</a>
                    {% endif %}
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-4">
        {% block content %}
        
        {% endblock %}
    </main>

    <footer class="text-center py-4 mt-5 text-muted">
        &copy; {{ current_year }} TechPulse - Veille Etudiante. Tous droits réservés.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
