<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} TechPulse{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Système de variables dynamiques */
        :root {
            --bg-body: #0b0e14;
            --bg-navbar: rgba(11, 14, 20, 0.8);
            --card-bg: #151921;
            --accent-blue: #0ea5e9;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        /* Mode Clair Overrides */
        body.light-mode {
            --bg-body: #f8fafc;
            --bg-navbar: rgba(255, 255, 255, 0.9);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding-top: 90px;
            transition: all 0.3s ease;
        }

        /* Navbar "Glass" dynamique */
        .navbar {
            background: var(--bg-navbar) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.8rem 0;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-main) !important;
        }

        .nav-link {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted) !important;
            transition: color 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-blue) !important;
        }

        /* Bouton Switch Thème */
        .theme-toggle {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(var(--accent-blue), 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            transform: rotate(15deg) scale(1.1);
            background: var(--accent-blue);
            color: white;
        }

        /* Boutons Authentification */
        .btn-auth {
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 10px;
            padding: 0.6rem 1.4rem;
            transition: all 0.2s ease;
        }

        .btn-primary-custom {
            background-color: var(--accent-blue);
            border: none;
            color: white !important;
        }

        .btn-primary-custom:hover {
            background-color: #0284c7;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
            transform: translateY(-1px);
        }

        /* Footer Stylisé */
        footer {
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-navbar);
            margin-top: 80px;
        }

        .footer-brand {
            color: var(--accent-blue);
            font-weight: 800;
        }

        /* Animation */
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body.light-mode .nav-link {
            color: #1e293b !important; /* Force un gris foncé pour le mode clair */
        }

        body.light-mode .navbar-brand {
            color: #1e293b !important;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-dark fixed-top">
            <div class="container">
                <a class="navbar-brand" href="{% url 'home' %}">
                    <span style="color: var(--accent-blue);">Tech</span>Pulse
                </a>
                
                <div class="d-flex align-items-center gap-2 gap-md-3">
                    <div id="theme-switch" class="theme-toggle me-2" title="Changer de mode">
                        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                    </div>

                    {% if user.is_authenticated %}
                        <a class="nav-link d-none d-lg-block" href="{% url 'my_favorites' %}">
                            <i class="bi bi-bookmark-star me-1"></i> Favoris
                        </a>
                        <a class="nav-link" href="{% url 'profile' %}">
                            <i class="bi bi-person-circle text-info"></i> <span class="d-none d-md-inline ms-1">Profil</span>
                        </a>
                        <form action="{% url 'logout' %}" method="post" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn-auth btn btn-outline-danger border-0">
                                <i class="bi bi-power"></i>
                            </button>
                        </form>
                    {% else %}
                        <a class="nav-link d-none d-sm-block" href="{% url 'login' %}">Connexion</a>
                        <a class="btn-auth btn-primary-custom text-decoration-none shadow-sm" href="{% url 'register' %}">Rejoindre</a>
                    {% endif %}
                </div>
            </div>
        </nav>
    </header>

    <main class="container fade-in">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-5">
        <div class="container text-center">
            <h4 class="footer-brand mb-3">TechPulse</h4>
            <p class="fw-bold mb-4" style="color: var(--text-main);">
                &copy; 2026 Veille Étudiante — <span class="text-info">Innovation & Actualité</span>
            </p>
            <div class="d-flex justify-content-center gap-4 fs-4 mb-4">
                <a href="#" class="text-info opacity-75"><i class="bi bi-github"></i></a>
                <a href="#" class="text-info opacity-75"><i class="bi bi-twitter-x"></i></a>
                <a href="#" class="text-info opacity-75"><i class="bi bi-linkedin"></i></a>
            </div>
            <p class="small opacity-50" style="color: var(--text-muted);">
                Plateforme optimisée pour la veille technologique académique et professionnelle.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const themeSwitch = document.getElementById('theme-switch');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        // Vérifier si un thème est déjà enregistré
        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
            themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        }

        themeSwitch.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                localStorage.setItem('theme', 'light');
            } else {
                themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
